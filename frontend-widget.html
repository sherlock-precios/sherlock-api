<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherlock by Luis — Comparador de precios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,html{background:#1a1a1a;color:#e8e8e8;font-family:system-ui,sans-serif}
.wrap{padding:2rem 1rem 1.5rem;max-width:700px;margin:0 auto;min-height:100vh}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-row{display:flex;align-items:baseline;justify-content:center;gap:10px}
.logo-text{font-size:46px;font-weight:400;letter-spacing:-1px;line-height:1}
.s1{color:#4285F4}.s2{color:#EA4335}.s3{color:#FBBC05}.s4{color:#4285F4}.s5{color:#34A853}.s6{color:#EA4335}.s7{color:#4285F4}.s8{color:#FBBC05}
.by-text{font-size:23px;font-weight:400;letter-spacing:-0.5px;line-height:1}
.by-word{color:#888;font-size:16px;margin-right:4px}
.l1{color:#EA4335}.l2{color:#4285F4}.l3{color:#FBBC05}.l4{color:#34A853}
.logo-sub{font-size:12px;color:#888;margin-top:6px;letter-spacing:0.06em}
.search-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.search-row input{flex:1;background:#2a2a2a;border:1px solid #3a3a3a;color:#e8e8e8;border-radius:24px;padding:10px 16px;font-size:15px;outline:none}
.search-row input:focus{border-color:#FBBC05}
.search-row input::placeholder{color:#666}
.lupa-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s}
.lupa-btn:hover{background:#2a2a2a}
.lupa-btn:disabled{cursor:not-allowed;opacity:0.5}
.lupa-svg{width:44px;height:44px;display:block}
.lupa-svg.spinning{animation:orbit .8s linear infinite;transform-origin:center}
@keyframes orbit{0%{transform:rotate(0deg) translate(5px) rotate(0deg)}100%{transform:rotate(360deg) translate(5px) rotate(-360deg)}}
.hint{font-size:12px;color:#666;margin-bottom:1.5rem;padding-left:2px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:1.25rem}
.card{background:#242424;border:0.5px solid #333;border-radius:12px;padding:.9rem 1rem;display:flex;flex-direction:column;gap:6px}
.card.best{border:2px solid #4285F4}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;align-self:flex-start}
.badge
